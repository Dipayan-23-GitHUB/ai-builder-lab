<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Builder Lab - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h1>AI Builder Lab</h1>
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <div class="tabs">
            <a href="{{ url_for('login') }}" class="{% if mode == 'login' %}active{% endif %}">Login</a>
            <a href="{{ url_for('signup') }}" class="{% if mode == 'signup' %}active{% endif %}">Sign Up</a>
        </div>

        <form method="POST">
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">{{ 'Sign Up' if mode == 'signup' else 'Login' }}</button>
        </form>
    </div>
</body>
</html>
